name: Build add-on container

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/build-container.yml"
      - "ha_print_monitor/**"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/nsocwx/ha_print_monitor_addon

jobs:
  build:
    name: Build ${{ matrix.platform }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            ha_arch: amd64
            suffix: amd64
          - platform: linux/arm64
            ha_arch: aarch64
            suffix: aarch64

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Read add-on version
        id: version
        shell: bash
        run: |
          version="$(sed -n 's/^version: "\([^"]*\)"/\1/p' ha_print_monitor/config.yaml)"
          if [[ -z "${version}" ]]; then
            echo "Could not read version from ha_print_monitor/config.yaml" >&2
            exit 1
          fi
          echo "version=${version}" >> "${GITHUB_OUTPUT}"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push architecture image
        uses: docker/build-push-action@v6
        with:
          context: ./ha_print_monitor
          file: ./ha_print_monitor/Dockerfile
          platforms: ${{ matrix.platform }}
          push: true
          build-args: |
            BUILD_VERSION=${{ steps.version.outputs.version }}
            BUILD_ARCH=${{ matrix.ha_arch }}
          tags: |
            ${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}-${{ matrix.suffix }}
            ${{ env.IMAGE_NAME }}:latest-${{ matrix.suffix }}

  manifest:
    name: Publish multi-arch manifest
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Read add-on version
        id: version
        shell: bash
        run: |
          version="$(sed -n 's/^version: "\([^"]*\)"/\1/p' ha_print_monitor/config.yaml)"
          if [[ -z "${version}" ]]; then
            echo "Could not read version from ha_print_monitor/config.yaml" >&2
            exit 1
          fi
          echo "version=${version}" >> "${GITHUB_OUTPUT}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create version manifest
        shell: bash
        run: |
          docker buildx imagetools create \
            --tag "${IMAGE_NAME}:${{ steps.version.outputs.version }}" \
            "${IMAGE_NAME}:${{ steps.version.outputs.version }}-amd64" \
            "${IMAGE_NAME}:${{ steps.version.outputs.version }}-aarch64"

      - name: Create latest manifest
        shell: bash
        run: |
          docker buildx imagetools create \
            --tag "${IMAGE_NAME}:latest" \
            "${IMAGE_NAME}:latest-amd64" \
            "${IMAGE_NAME}:latest-aarch64"
