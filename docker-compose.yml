version: '3.8'

services:
  ha-print-monitor:
    build: .
    container_name: ha-print-monitor
    ports:
      - "8080:8080"
    volumes:
      - ./data:/data
    # If you want to use config.yaml exclusively, remove or comment out environment overrides.
    # environment:
    #   - DATA_DIR=/data
    #   - HA_URL=http://homeassistant.local:8123
    #   - HA_TOKEN=your-long-lived-token-here
    #   - APP_BASE_URL=http://localhost:8080
    #   - ACTION_TOKEN=your-secure-token-here
    restart: unless-stopped
    networks:
      - default

networks:
  default:
    driver: bridge
