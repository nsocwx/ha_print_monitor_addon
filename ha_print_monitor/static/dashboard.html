<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HA Print Monitor Dashboard</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: #0d1117;
            color: #c9d1d9;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        .header {
            background: #111827;
            border-bottom: 1px solid rgba(255,255,255,0.08);
            padding: 1.5rem 2rem;
        }

        .header h1 {
            color: #eff6ff;
            font-size: 1.75rem;
            margin-bottom: 0.25rem;
        }

        .header p {
            color: #8b949e;
        }

        .container {
            max-width: 1280px;
            margin: 1.5rem auto;
            padding: 0 1rem;
        }

        .printer-tabs {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }

        button {
            border: 0;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 600;
            padding: 0.55rem 0.8rem;
        }

        button:disabled {
            cursor: not-allowed;
            opacity: 0.5;
        }

        .tab-button {
            background: #21262d;
            border: 1px solid rgba(255,255,255,0.1);
            color: #c9d1d9;
        }

        .tab-button.active {
            background: #238636;
            border-color: #2ea043;
            color: #fff;
        }

        .btn-primary { background: #2563eb; color: #fff; }
        .btn-danger { background: #dc2626; color: #fff; }
        .btn-warning { background: #f59e0b; color: #111827; }
        .btn-secondary { background: #374151; color: #fff; }

        .banner {
            align-items: center;
            background: #161b22;
            border: 1px solid rgba(255,255,255,0.08);
            border-left: 4px solid #58a6ff;
            border-radius: 8px;
            display: grid;
            gap: 1rem;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            margin-bottom: 1rem;
            padding: 1rem;
        }

        .banner-item label,
        .status-item label {
            color: #8b949e;
            display: block;
            font-size: 0.8rem;
            font-weight: 700;
            margin-bottom: 0.25rem;
            text-transform: uppercase;
        }

        .banner-item strong,
        .value {
            color: #e5edf6;
            display: block;
            font-size: 0.95rem;
            overflow-wrap: anywhere;
        }

        .grid {
            display: grid;
            gap: 1rem;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            margin-bottom: 1rem;
        }

        .card {
            background: #161b22;
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 8px;
            padding: 1rem;
        }

        .card h2 {
            color: #58a6ff;
            font-size: 1.05rem;
            margin-bottom: 0.8rem;
        }

        .card-header {
            align-items: center;
            display: flex;
            gap: 1rem;
            justify-content: space-between;
            margin-bottom: 0.8rem;
        }

        .card-header h2 {
            margin: 0;
        }

        .status-item {
            margin-bottom: 0.8rem;
        }

        .status-badge {
            border-radius: 999px;
            display: inline-block;
            font-weight: 700;
            padding: 0.35rem 0.7rem;
        }

        .healthy { background: #123524; color: #5fd5a0; }
        .degraded { background: #332d16; color: #f2c94c; }
        .unhealthy { background: #3b1e24; color: #ff7b72; }
        .muted { color: #8b949e; }
        .status-badge.muted { background: #21262d; color: #8b949e; }

        .severity-critical,
        .severity-high { color: #ff7b72; }
        .severity-medium { color: #f2c94c; }
        .severity-low { color: #7dd3fc; }

        .countdown {
            background: #3b1e24;
            border: 1px solid #7f1d1d;
            border-radius: 8px;
            color: #fecaca;
            font-size: 1.1rem;
            font-weight: 800;
            margin-bottom: 1rem;
            padding: 1rem;
        }

        .action-buttons,
        .optional-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-top: 0.8rem;
        }

        .snapshot-image,
        .event-thumb {
            background: #0d1117;
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 6px;
            object-fit: contain;
        }

        .snapshot-image {
            aspect-ratio: 16 / 9;
            display: block;
            width: 100%;
        }

        .snapshot-empty {
            align-items: center;
            aspect-ratio: 16 / 9;
            border: 1px dashed rgba(255,255,255,0.16);
            border-radius: 6px;
            color: #8b949e;
            display: flex;
            justify-content: center;
            padding: 1rem;
            text-align: center;
        }

        .event-item {
            align-items: start;
            background: #111827;
            border-left: 3px solid #58a6ff;
            border-radius: 6px;
            display: grid;
            gap: 0.8rem;
            grid-template-columns: 96px 1fr;
            margin-bottom: 0.7rem;
            padding: 0.8rem;
        }

        .event-thumb {
            aspect-ratio: 4 / 3;
            width: 96px;
        }

        .event-thumb-placeholder {
            align-items: center;
            background: #0d1117;
            border: 1px dashed rgba(255,255,255,0.14);
            border-radius: 6px;
            color: #8b949e;
            display: flex;
            font-size: 0.75rem;
            justify-content: center;
            width: 96px;
            aspect-ratio: 4 / 3;
        }

        .event-time {
            color: #8b949e;
            font-size: 0.82rem;
            margin-bottom: 0.25rem;
        }

        .event-type {
            color: #e5edf6;
            font-weight: 800;
        }

        .event-certainty {
            background: #2563eb;
            border-radius: 4px;
            color: #fff;
            display: inline-block;
            font-size: 0.78rem;
            margin-left: 0.4rem;
            padding: 0.15rem 0.35rem;
        }

        .timeline-row {
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.06);
            display: grid;
            gap: 0.6rem;
            grid-template-columns: 56px 1fr auto;
            padding: 0.45rem 0;
        }

        .timeline-row:last-child {
            border-bottom: 0;
        }

        .timeline-thumb {
            aspect-ratio: 4 / 3;
            background: #0d1117;
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 4px;
            object-fit: contain;
            width: 56px;
        }

        .timeline-meta {
            color: #8b949e;
            font-size: 0.78rem;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>HA Print Monitor</h1>
        <p>Real-time 3D print monitoring with Home Assistant</p>
    </div>

    <div class="container">
        <div id="printer-tabs" class="printer-tabs"></div>
        <div id="operator-banner" class="banner"></div>
        <div id="auto-pause-countdown"></div>

        <div class="grid">
            <div class="card">
                <h2>Status</h2>
                <div id="status-content"></div>
                <div class="optional-actions" id="global-optional-action-buttons"></div>
            </div>

            <div class="card">
                <h2>Latest Snapshot</h2>
                <div id="snapshot-content"></div>
            </div>

            <div class="card">
                <h2>Latest Analysis</h2>
                <div id="latest-analysis-content"></div>
            </div>

            <div class="card">
                <h2>Camera Health</h2>
                <div id="camera-health-content"></div>
            </div>

            <div class="card">
                <h2>Active Issue</h2>
                <div id="event-content"></div>
            </div>

            <div class="card">
                <h2>Health</h2>
                <div id="health-content"></div>
            </div>

            <div class="card">
                <h2>Print Protection</h2>
                <div id="print-protection-content"></div>
            </div>

            <div class="card">
                <h2>Analysis Timeline</h2>
                <div id="analysis-timeline-content"></div>
            </div>
        </div>

        <div class="card">
            <div class="card-header">
                <h2>Recent Events</h2>
                <button class="btn-secondary" id="clear-events-button">Clear</button>
            </div>
            <div id="events-content"></div>
        </div>

        <div class="card" style="margin-top: 1rem;">
            <h2>Configuration</h2>
            <div id="config-content"></div>
        </div>
    </div>

    <script>
        function getIngressBase() {
            const path = window.location.pathname.replace(/\/$/, '');
            return path === '' ? '' : path;
        }

        const API_BASE = getIngressBase();
        const SELECTED_PRINTER_KEY = 'haPrintMonitor.selectedPrinterId';
        let printers = [];
        let activePrinterId = localStorage.getItem(SELECTED_PRINTER_KEY);
        let configuredTimeZone = Intl.DateTimeFormat().resolvedOptions().timeZone;
        let refreshInFlight = false;
        let lastStatus = null;
        let lastConfig = null;
        let countdownTimer = null;
        const optionalEndpointCache = new Map();

        const optionalActions = [
            { id: 'capture-now-button', label: 'Capture Now', path: '/api/actions/capture-now', method: 'POST' },
            { id: 'analyze-now-button', label: 'Analyze Now', path: '/api/actions/analyze-now', method: 'POST' },
            { id: 'test-notification-button', label: 'Send Test Notification', path: '/api/actions/test-notification', method: 'POST' },
        ];

        function esc(value) {
            return String(value ?? '').replace(/[&<>"']/g, (char) => ({
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#39;',
            }[char]));
        }

        function classToken(value) {
            return String(value ?? '').toLowerCase().replace(/[^a-z0-9_-]/g, '-');
        }

        function printerQuery() {
            return activePrinterId ? `?printer_id=${encodeURIComponent(activePrinterId)}` : '';
        }

        function eventsQuery(limit = 10) {
            const params = new URLSearchParams({ limit: String(limit) });
            if (activePrinterId) params.set('printer_id', activePrinterId);
            return params.toString();
        }

        function parseApiDate(value) {
            if (!value) return null;
            if (typeof value !== 'string') return new Date(value);
            const hasExplicitZone = /(?:Z|[+-]\d{2}:?\d{2})$/i.test(value);
            return new Date(hasExplicitZone ? value : `${value}Z`);
        }

        function formatDateTime(value) {
            const date = parseApiDate(value);
            if (!date || Number.isNaN(date.getTime())) return 'Unknown';
            try {
                return new Intl.DateTimeFormat(undefined, {
                    dateStyle: 'short',
                    timeStyle: 'medium',
                    timeZone: configuredTimeZone,
                }).format(date);
            } catch (e) {
                return date.toLocaleString();
            }
        }

        function formatDuration(ms) {
            if (!Number.isFinite(ms)) return 'Unknown';
            const totalSeconds = Math.max(0, Math.floor(ms / 1000));
            const minutes = Math.floor(totalSeconds / 60);
            const seconds = totalSeconds % 60;
            return `${minutes}m ${String(seconds).padStart(2, '0')}s`;
        }

        function imageUrlFromPath(path) {
            if (!path) return null;
            return `${API_BASE}/captures/${encodeURIComponent(path.split(/[\\/]/).pop())}`;
        }

        function renderLoadError(error) {
            const message = error?.message || String(error || 'Unknown error');
            document.getElementById('operator-banner').innerHTML = `
                <div class="banner-item">
                    <label>Dashboard</label>
                    <strong class="severity-high">Unable to load add-on API</strong>
                </div>
                <div class="banner-item">
                    <label>Request Base</label>
                    <strong>${esc(API_BASE || '/')}</strong>
                </div>
                <div class="banner-item">
                    <label>Error</label>
                    <strong>${esc(message)}</strong>
                </div>
            `;
            const panels = [
                'status-content',
                'snapshot-content',
                'latest-analysis-content',
                'camera-health-content',
                'event-content',
                'health-content',
                'print-protection-content',
                'analysis-timeline-content',
                'events-content',
                'config-content',
            ];
            panels.forEach((id) => {
                const element = document.getElementById(id);
                if (element && !element.innerHTML) {
                    element.innerHTML = '<p class="muted">Waiting for add-on API data...</p>';
                }
            });
        }

        async function loadPrinters() {
            const resp = await fetch(`${API_BASE}/api/printers`);
            if (!resp.ok) throw new Error(`Failed to load printers (${resp.status})`);
            printers = await resp.json();
            if (!printers.some((printer) => printer.printer_id === activePrinterId)) {
                activePrinterId = printers[0]?.printer_id || null;
            }
            if (activePrinterId) {
                localStorage.setItem(SELECTED_PRINTER_KEY, activePrinterId);
            }
            renderTabs();
        }

        function renderTabs() {
            const tabs = document.getElementById('printer-tabs');
            if (printers.length <= 1) {
                tabs.innerHTML = '';
                return;
            }
            tabs.innerHTML = printers.map((printer) => `
                <button class="tab-button ${printer.printer_id === activePrinterId ? 'active' : ''}" data-printer-id="${esc(printer.printer_id)}">
                    ${esc(printer.printer_name)}
                </button>
            `).join('');
            tabs.querySelectorAll('button[data-printer-id]').forEach((button) => {
                button.addEventListener('click', () => selectPrinter(button.dataset.printerId));
            });
        }

        function selectPrinter(printerId) {
            activePrinterId = printerId;
            localStorage.setItem(SELECTED_PRINTER_KEY, printerId);
            renderTabs();
            refreshAll(true);
        }

        async function fetchStatusOnce() {
            const resp = await fetch(`${API_BASE}/api/status${printerQuery()}`);
            if (!resp.ok) throw new Error(`Failed to load status (${resp.status})`);
            lastStatus = await resp.json();
            return lastStatus;
        }

        async function loadConfig() {
            const resp = await fetch(`${API_BASE}/api/config${printerQuery()}`);
            if (!resp.ok) throw new Error(`Failed to load config (${resp.status})`);
            const data = await resp.json();
            lastConfig = data;
            configuredTimeZone = data.timezone || configuredTimeZone;
            renderConfig(data);
            return data;
        }

        async function loadHealth() {
            const resp = await fetch(`${API_BASE}/health`);
            if (!resp.ok) throw new Error(`Failed to load health (${resp.status})`);
            renderHealth(await resp.json());
        }

        async function loadEvents() {
            const resp = await fetch(`${API_BASE}/api/events?${eventsQuery(10)}`);
            if (!resp.ok) throw new Error(`Failed to load events (${resp.status})`);
            renderEvents(await resp.json());
        }

        async function loadAnalysisTimeline() {
            const params = new URLSearchParams({ limit: '8' });
            if (activePrinterId) params.set('printer_id', activePrinterId);
            const resp = await fetch(`${API_BASE}/api/analysis/recent?${params.toString()}`);
            if (!resp.ok) throw new Error(`Failed to load analysis timeline (${resp.status})`);
            renderAnalysisTimeline(await resp.json());
        }

        function renderAllFromStatus(status) {
            renderBanner(status);
            renderStatus(status);
            renderSnapshot(status);
            renderLatestAnalysis(status);
            renderCameraHealth(status);
            renderActiveIssue(status);
            renderPrintProtection(status);
            renderCountdown(status.active_event);
        }

        function renderBanner(status) {
            const latest = status.latest_analysis_result;
            const latestText = latest
                ? `${latest.issue_detected ? 'Issue' : 'Clear'} (${Math.round((latest.certainty || 0) * 100)}%)`
                : 'No analysis yet';
            const severity = status.active_event?.severity || 'None';
            document.getElementById('operator-banner').innerHTML = `
                <div class="banner-item">
                    <label>Printer</label>
                    <strong>${esc(status.printer_name || activePrinterId || 'Unknown')}</strong>
                </div>
                <div class="banner-item">
                    <label>Print State</label>
                    <strong>${esc(status.printer_state || 'Unknown')}</strong>
                </div>
                <div class="banner-item">
                    <label>Monitoring</label>
                    <strong>${status.monitoring_enabled ? 'Enabled' : 'Disabled'}</strong>
                </div>
                <div class="banner-item">
                    <label>Latest Analysis</label>
                    <strong>${esc(latestText)}</strong>
                </div>
                <div class="banner-item">
                    <label>Active Severity</label>
                    <strong class="severity-${classToken(severity)}">${esc(severity)}</strong>
                </div>
            `;
        }

        function renderStatus(status) {
            document.getElementById('status-content').innerHTML = `
                <div class="status-item">
                    <label>Monitoring</label>
                    <span class="status-badge ${status.monitoring_enabled ? 'healthy' : 'unhealthy'}">${status.monitoring_enabled ? 'Enabled' : 'Disabled'}</span>
                </div>
                <div class="status-item">
                    <label>Printer State</label>
                    <span class="value">${esc(status.printer_state || 'Unknown')}</span>
                </div>
                <div class="status-item">
                    <label>Printing</label>
                    <span class="status-badge ${status.printer_printing ? 'healthy' : 'unhealthy'}">${status.printer_printing ? 'Yes' : 'No'}</span>
                </div>
                <div class="status-item">
                    <label>Last Capture</label>
                    <span class="value">${esc(formatDateTime(status.last_capture_time))}</span>
                </div>
            `;
            renderGlobalOptionalActionButtons();
        }

        function renderSnapshot(status) {
            const container = document.getElementById('snapshot-content');
            if (!status.last_capture_image_url) {
                const detail = status.last_capture_error
                    ? `<p class="muted" style="margin-top:0.6rem;">${esc(status.last_capture_error)}</p>`
                    : '';
                container.innerHTML = `<div class="snapshot-empty"><div>No camera capture yet${detail}</div></div>`;
                return;
            }
            const url = `${API_BASE}${status.last_capture_image_url}?t=${Date.now()}`;
            container.innerHTML = `
                <div class="status-item">
                    <label>Captured</label>
                    <span class="value">${esc(formatDateTime(status.last_capture_time))}</span>
                </div>
                <img src="${esc(url)}" alt="Latest camera snapshot" class="snapshot-image">
            `;
        }

        function renderLatestAnalysis(status) {
            const result = status.latest_analysis_result;
            if (!result) {
                document.getElementById('latest-analysis-content').innerHTML = '<p class="muted">No analysis has run yet.</p>';
                return;
            }
            document.getElementById('latest-analysis-content').innerHTML = `
                <div class="status-item">
                    <label>Result</label>
                    <span class="value">${result.issue_detected ? 'Issue detected' : 'No issue detected'}</span>
                </div>
                <div class="status-item">
                    <label>Issue Type</label>
                    <span class="value">${esc(result.issue_type || 'None')}</span>
                </div>
                <div class="status-item">
                    <label>Certainty</label>
                    <span class="value">${Math.round((result.certainty || 0) * 100)}%</span>
                </div>
                <div class="status-item">
                    <label>Explanation</label>
                    <span class="value">${esc(result.explanation || 'No explanation')}</span>
                </div>
                <div class="status-item">
                    <label>Analyzed</label>
                    <span class="value">${esc(formatDateTime(status.last_analysis_time || result.timestamp))}</span>
                </div>
            `;
        }

        function renderCameraHealth(status) {
            const captureDate = parseApiDate(status.last_capture_time);
            const ageMs = captureDate ? Date.now() - captureDate.getTime() : NaN;
            const stale = Boolean(status.camera_stale);
            const captureError = status.last_capture_status === 'error';
            const stateClass = captureError ? 'unhealthy' : !status.last_capture_time ? 'unhealthy' : stale ? 'degraded' : 'healthy';
            const stateText = captureError ? 'Capture error' : !status.last_capture_time ? 'No capture' : stale ? 'Stale frame' : 'Recent frame';
            const warning = captureError
                ? (status.last_capture_error || 'Latest camera response was not a valid image.')
                : stale
                    ? 'Last valid frame is older than 2 minutes.'
                    : 'None';
            document.getElementById('camera-health-content').innerHTML = `
                <div class="status-item">
                    <label>Capture Status</label>
                    <span class="status-badge ${stateClass}">${esc(stateText)}</span>
                </div>
                <div class="status-item">
                    <label>Last Capture Age</label>
                    <span class="value">${status.last_capture_time ? esc(formatDuration(ageMs)) : 'Unknown'}</span>
                </div>
                <div class="status-item">
                    <label>Warning</label>
                    <span class="value">${esc(warning)}</span>
                </div>
                <div class="status-item">
                    <label>Successful Captures</label>
                    <span class="value">${Number(status.capture_success_count || 0)}</span>
                </div>
                <div class="status-item">
                    <label>Failed Captures</label>
                    <span class="value">${Number(status.capture_failure_count || 0)}</span>
                </div>
                ${status.last_capture_error ? `
                    <div class="status-item">
                        <label>Last Error</label>
                        <span class="value">${esc(status.last_capture_error)}</span>
                    </div>
                ` : ''}
            `;
        }

        function renderActiveIssue(status) {
            const event = status.active_event;
            if (!event) {
                document.getElementById('event-content').innerHTML = '<p class="muted">No active issues</p>';
                return;
            }
            const imageUrl = imageUrlFromPath(event.image_path);
            document.getElementById('event-content').innerHTML = `
                <div class="event-card severity-${classToken(event.severity)}">
                    <div class="event-time">${esc(formatDateTime(event.created_at))}</div>
                    <div class="event-type">${esc((event.issue_type || 'Unknown').replace(/_/g, ' ').toUpperCase())}</div>
                    <div class="status-item" style="margin-top: 0.75rem;">
                        <label>Severity</label>
                        <span class="value">${esc(event.severity)}</span>
                    </div>
                    <div class="status-item">
                        <label>Certainty</label>
                        <span class="value">${Math.round((event.certainty || 0) * 100)}%</span>
                    </div>
                    <div class="status-item">
                        <label>Status</label>
                        <span class="value">${esc(event.status)}</span>
                    </div>
                    <div class="status-item">
                        <label>Recommended Action</label>
                        <span class="value">${esc(event.recommended_action)}</span>
                    </div>
                    <p class="muted">${esc(event.explanation || '')}</p>
                    ${imageUrl ? `<img src="${esc(imageUrl)}" alt="Event capture" class="snapshot-image" style="margin-top: 0.8rem;">` : ''}
                    <div class="action-buttons">
                        <button class="btn-danger" data-action="pause">Pause Now</button>
                        <button class="btn-primary" data-action="acknowledge">Acknowledge</button>
                        <button class="btn-warning" data-action="snooze">Snooze 15 Minutes</button>
                        <button class="btn-secondary" data-action="ignore">Ignore</button>
                    </div>
                    <div class="optional-actions" id="optional-action-buttons"></div>
                </div>
            `;
            document.querySelectorAll('[data-action]').forEach((button) => {
                button.addEventListener('click', () => runEventAction(button.dataset.action, event.event_id));
            });
            renderOptionalActionButtons(event.event_id);
        }

        function protectionState(status) {
            const event = status.active_event;
            const autoPauseEnabled = Boolean(lastConfig?.auto_pause_enabled);
            if (!status.monitoring_enabled) {
                return { label: 'Disabled', className: 'unhealthy', message: 'Monitoring is disabled.' };
            }
            if (event?.auto_pause_deadline) {
                return { label: 'Pending Pause', className: 'degraded', message: 'Active issue is scheduled for auto-pause.' };
            }
            if (!status.printer_printing) {
                return { label: 'Standby', className: 'muted', message: 'Printer is not currently printing.' };
            }
            if (autoPauseEnabled) {
                return { label: 'Armed', className: 'healthy', message: 'Protection armed. No active issues.' };
            }
            return { label: 'Watching', className: 'healthy', message: 'Monitoring print, auto-pause disabled.' };
        }

        function renderPrintProtection(status) {
            const config = lastConfig || {};
            const event = status.active_event;
            const state = protectionState(status);
            const deadline = parseApiDate(event?.auto_pause_deadline);
            const countdown = deadline ? `Auto-pause in ${formatDuration(deadline.getTime() - Date.now())}` : state.message;
            document.getElementById('print-protection-content').innerHTML = `
                <div class="status-item">
                    <label>Protection Status</label>
                    <span class="status-badge ${esc(state.className)}">${esc(state.label)}</span>
                </div>
                <div class="status-item">
                    <label>Auto-Pause</label>
                    <span class="value">${config.auto_pause_enabled ? 'Enabled' : 'Disabled'}</span>
                </div>
                <div class="status-item">
                    <label>Notification Threshold</label>
                    <span class="value">${Math.round((config.certainty_threshold_notify || 0) * 100)}%</span>
                </div>
                <div class="status-item">
                    <label>Auto-Pause Threshold</label>
                    <span class="value">${Math.round((config.certainty_threshold_auto_pause || 0) * 100)}%</span>
                </div>
                <div class="status-item">
                    <label>Auto-Pause Delay</label>
                    <span class="value">${Number(config.auto_pause_delay_minutes || 0)} minutes</span>
                </div>
                <div class="status-item">
                    <label>Confirmation Frames</label>
                    <span class="value">${Number(config.confirmation_frames || 0)}</span>
                </div>
                <div class="status-item">
                    <label>Cooldown</label>
                    <span class="value">${Number(config.cooldown_minutes || 0)} minutes</span>
                </div>
                <div class="${event?.auto_pause_deadline ? 'countdown' : 'muted'}" id="protection-countdown-text">${esc(countdown)}</div>
                ${event ? `
                    <div class="action-buttons">
                        <button class="btn-danger" data-protection-action="pause">Pause Now</button>
                        <button class="btn-primary" data-protection-action="acknowledge">Acknowledge</button>
                        <button class="btn-warning" data-protection-action="snooze">Snooze 15 Min</button>
                        <button class="btn-secondary" data-protection-action="ignore">Ignore</button>
                    </div>
                ` : ''}
            `;
            document.querySelectorAll('[data-protection-action]').forEach((button) => {
                button.addEventListener('click', () => runEventAction(button.dataset.protectionAction, event.event_id));
            });
        }

        function renderCountdown(event) {
            const container = document.getElementById('auto-pause-countdown');
            if (countdownTimer) {
                clearInterval(countdownTimer);
                countdownTimer = null;
            }
            if (!event || !event.auto_pause_deadline) {
                container.innerHTML = '';
                return;
            }
            const update = () => {
                const deadline = parseApiDate(event.auto_pause_deadline);
                const remainingMs = deadline ? deadline.getTime() - Date.now() : NaN;
                container.innerHTML = `
                    <div class="countdown">
                        Auto-pause countdown: ${esc(formatDuration(remainingMs))}
                    </div>
                `;
                const protectionCountdown = document.getElementById('protection-countdown-text');
                if (protectionCountdown) {
                    protectionCountdown.textContent = `Auto-pause in ${formatDuration(remainingMs)}`;
                }
            };
            update();
            countdownTimer = setInterval(update, 1000);
        }

        function renderEvents(events) {
            if (!events.length) {
                document.getElementById('events-content').innerHTML = '<p class="muted">No events yet</p>';
                return;
            }
            document.getElementById('events-content').innerHTML = `
                <div class="events-list">
                    ${events.map((event) => {
                        const imageUrl = imageUrlFromPath(event.image_path);
                        return `
                            <div class="event-item">
                                ${imageUrl
                                    ? `<img src="${esc(imageUrl)}" alt="Event thumbnail" class="event-thumb">`
                                    : '<div class="event-thumb-placeholder">No image</div>'}
                                <div>
                                    <div class="event-time">${esc(formatDateTime(event.created_at))}</div>
                                    <div class="event-type">
                                        ${esc((event.issue_type || 'Unknown').replace(/_/g, ' ').toUpperCase())}
                                        <span class="event-certainty">${Math.round((event.certainty || 0) * 100)}%</span>
                                    </div>
                                    <div class="muted" style="margin-top: 0.4rem;">${esc(event.explanation || '')}</div>
                                    <div class="muted" style="margin-top: 0.4rem;">Status: ${esc(event.status)}</div>
                                </div>
                            </div>
                        `;
                    }).join('')}
                </div>
            `;
        }

        function renderAnalysisTimeline(rows) {
            const container = document.getElementById('analysis-timeline-content');
            if (!rows.length) {
                container.innerHTML = '<p class="muted">No analysis history yet</p>';
                return;
            }

            container.innerHTML = rows.map((row) => {
                const imageUrl = row.image_url ? `${API_BASE}${row.image_url}` : null;
                const label = timelineLabel(row);
                const severity = row.severity || 'low';
                return `
                    <div class="timeline-row">
                        ${imageUrl
                            ? `<img src="${esc(imageUrl)}" alt="Analysis thumbnail" class="timeline-thumb">`
                            : '<div class="event-thumb-placeholder" style="width:56px;">No image</div>'}
                        <div>
                            <div class="event-type severity-${classToken(severity)}">${esc(label)}</div>
                            <div class="timeline-meta">${esc(formatDateTime(row.created_at))}${row.severity ? ` · ${esc(row.severity)}` : ''}</div>
                        </div>
                        <span class="event-certainty">${Math.round((row.certainty || 0) * 100)}%</span>
                    </div>
                `;
            }).join('');
        }

        function timelineLabel(row) {
            if (row.result === 'clear') return 'Clear';
            if (row.issue_type) return row.issue_type.replace(/_/g, ' ');
            if (row.result === 'issue') return 'Possible Issue';
            return row.result || 'Unknown';
        }

        function renderHealth(data) {
            document.getElementById('health-content').innerHTML = `
                <div class="status-item">
                    <label>Overall</label>
                    <span class="status-badge ${classToken(data.status)}">${esc(data.status)}</span>
                </div>
                <div class="status-item">
                    <label>Database</label>
                    <span class="status-badge ${classToken(data.database)}">${esc(data.database)}</span>
                </div>
                <div class="status-item">
                    <label>Home Assistant</label>
                    <span class="status-badge ${classToken(data.home_assistant)}">${esc(data.home_assistant)}</span>
                </div>
                <div class="status-item">
                    <label>Analyzer</label>
                    <span class="status-badge ${classToken(data.analyzer)}">${esc(data.analyzer)}</span>
                </div>
                <div class="status-item">
                    <label>Add-on</label>
                    <span class="status-badge ${classToken(data.addon || 'unknown')}">${esc(data.addon || 'unknown')}</span>
                </div>
                <div class="status-item">
                    <label>Version</label>
                    <span class="value">${esc(data.app_version || 'unknown')} (${esc(data.git_commit || 'unknown')})</span>
                </div>
                <div class="status-item">
                    <label>Uptime</label>
                    <span class="value">${Number(data.uptime_seconds / 60).toFixed(1)} minutes</span>
                </div>
            `;
        }

        function renderConfig(data) {
            const printer = data.selected_printer || {};
            const pauseService = printer.pause_service || {};
            document.getElementById('config-content').innerHTML = `
                <div class="status-item"><label>External Base URL</label><span class="value">${esc(data.external_base_url || 'Not configured')}</span></div>
                <div class="status-item"><label>Timezone</label><span class="value">${esc(data.timezone)}</span></div>
                <div class="status-item"><label>Home Assistant API</label><span class="value">${esc(data.home_assistant_url)}</span></div>
                <div class="status-item"><label>Selected Printer</label><span class="value">${esc(printer.name || 'Unknown')}</span></div>
                <div class="status-item"><label>Camera Entity</label><span class="value">${esc(printer.camera_entity || data.camera_entity)}</span></div>
                <div class="status-item"><label>Printer State Entity</label><span class="value">${esc(printer.printer_state_entity || data.printer_state_entity)}</span></div>
                <div class="status-item"><label>Pause Target</label><span class="value">${esc(pauseService.target || 'Not configured')}</span></div>
                <div class="status-item"><label>Analyzer Provider</label><span class="value">${esc(data.analyzer_provider)}</span></div>
                <div class="status-item"><label>Analyzer Device</label><span class="value">${esc(data.analyzer_device)}</span></div>
                <div class="status-item"><label>Frame Interval</label><span class="value">${Number(data.frame_interval_seconds)}s</span></div>
                <div class="status-item"><label>Confirmation Frames</label><span class="value">${Number(data.confirmation_frames || 0)}</span></div>
                <div class="status-item"><label>Notification Threshold</label><span class="value">${Math.round((data.certainty_threshold_notify || 0) * 100)}%</span></div>
                <div class="status-item"><label>Auto-Pause</label><span class="value">${data.auto_pause_enabled ? 'Enabled' : 'Disabled'}</span></div>
                <div class="status-item"><label>Auto-Pause Threshold</label><span class="value">${Math.round((data.certainty_threshold_auto_pause || 0) * 100)}%</span></div>
                <div class="status-item"><label>Auto-Pause Delay</label><span class="value">${Number(data.auto_pause_delay_minutes)} minutes</span></div>
                <div class="status-item"><label>Cooldown</label><span class="value">${Number(data.cooldown_minutes || 0)} minutes</span></div>
            `;
        }

        async function runEventAction(action, eventId) {
            const tokenParams = new URLSearchParams({
                event_id: eventId,
                action,
            });
            const tokenResp = await fetch(`${API_BASE}/api/actions/token?${tokenParams.toString()}`, { method: 'POST' });
            if (tokenResp.status === 401) {
                alert('Could not create action token.');
                return;
            }
            if (!tokenResp.ok) {
                alert(`Could not create action token for ${action}.`);
                return;
            }
            const tokenData = await tokenResp.json();
            const params = new URLSearchParams({ token: tokenData.token });
            let path = `/api/actions/${action}`;
            if (action === 'snooze') {
                path = '/api/actions/snooze';
                params.set('minutes', '15');
            }
            const resp = await fetch(`${API_BASE}${path}?${params.toString()}`, { method: 'POST' });
            if (resp.status === 401) {
                alert('Invalid action token.');
                return;
            }
            if (!resp.ok) {
                alert(`Action failed: ${action}`);
                return;
            }
            await refreshAll(true);
        }

        async function endpointExists(path) {
            if (optionalEndpointCache.has(path)) {
                return optionalEndpointCache.get(path);
            }
            try {
                const resp = await fetch(`${API_BASE}${path}`, { method: 'OPTIONS' });
                const exists = resp.status !== 404;
                optionalEndpointCache.set(path, exists);
                return exists;
            } catch (e) {
                optionalEndpointCache.set(path, false);
                return false;
            }
        }

        async function renderGlobalOptionalActionButtons() {
            const container = document.getElementById('global-optional-action-buttons');
            if (!container) return;
            const available = [];
            for (const action of optionalActions) {
                if (await endpointExists(action.path)) available.push(action);
            }
            if (!available.length) {
                container.innerHTML = '';
                return;
            }
            container.innerHTML = available.map((action) => `
                <button class="btn-secondary" data-optional-path="${esc(action.path)}">${esc(action.label)}</button>
            `).join('');
            container.querySelectorAll('[data-optional-path]').forEach((button) => {
                button.addEventListener('click', () => runOptionalAction(button.dataset.optionalPath, lastStatus?.active_event?.event_id));
            });
        }

        async function renderOptionalActionButtons(eventId) {
            const container = document.getElementById('optional-action-buttons');
            if (!container) return;
            const available = [];
            for (const action of optionalActions) {
                if (await endpointExists(action.path)) available.push(action);
            }
            if (!available.length) {
                container.innerHTML = '';
                return;
            }
            container.innerHTML = available.map((action) => `
                <button class="btn-secondary" data-optional-path="${esc(action.path)}">${esc(action.label)}</button>
            `).join('');
            container.querySelectorAll('[data-optional-path]').forEach((button) => {
                button.addEventListener('click', () => runOptionalAction(button.dataset.optionalPath, eventId));
            });
        }

        async function runOptionalAction(path, eventId) {
            const params = new URLSearchParams();
            if (activePrinterId) params.set('printer_id', activePrinterId);
            if (eventId) params.set('event_id', eventId);
            const suffix = params.toString() ? `?${params.toString()}` : '';
            const resp = await fetch(`${API_BASE}${path}${suffix}`, { method: 'POST' });
            if (!resp.ok) alert('Optional action failed.');
            await refreshAll(true);
        }

        async function clearRecentEvents() {
            if (!confirm('Clear recent events for this printer?')) return;
            const params = new URLSearchParams();
            if (activePrinterId) params.set('printer_id', activePrinterId);
            const suffix = params.toString() ? `?${params.toString()}` : '';
            const resp = await fetch(`${API_BASE}/api/events/clear${suffix}`, { method: 'POST' });
            if (!resp.ok) {
                alert('Failed to clear recent events');
                return;
            }
            await refreshAll(true);
        }

        async function refreshAll(force = false) {
            if (refreshInFlight && !force) return;
            refreshInFlight = true;
            try {
                await loadPrinters();
                await loadConfig();
                const status = await fetchStatusOnce();
                renderAllFromStatus(status);
                await Promise.all([loadHealth(), loadEvents(), loadAnalysisTimeline()]);
            } catch (e) {
                console.error(e);
                renderLoadError(e);
            } finally {
                refreshInFlight = false;
            }
        }

        document.getElementById('clear-events-button').addEventListener('click', clearRecentEvents);
        refreshAll(true);
        setInterval(() => refreshAll(false), 5000);
    </script>
</body>
</html>
