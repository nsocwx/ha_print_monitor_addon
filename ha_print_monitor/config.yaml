name: "HA Print Monitor"
slug: "ha_print_monitor"
description: "Monitor 3D prints with Home Assistant cameras, model analysis, notifications, and safe pause actions."
version: "0.3.1"
arch:
  - amd64
  - aarch64
startup: services
boot: auto
init: false
ingress: true
ingress_port: 8080
panel_icon: mdi:printer-3d
panel_title: Print Monitor
homeassistant_api: true
map:
  - addon_config:rw
  - data:rw
options:
  printers:
    - printer_id: mk4s
      name: MK4s
      camera_entity: camera.example_camera
      printer_state_entity: sensor.example_printer_state
      printing_states:
        - printing
        - Printing
        - running
      pause_service_domain: button
      pause_service_service: press
      pause_service_target: button.example_pause_print
      pause_service_data_json: "{}"
      notify_services:
        - notify.mobile_app_mobile_phone
  monitoring:
    enabled: true
    frame_interval_seconds: 30
    confirmation_frames: 3
    certainty_threshold_notify: 0.70
    certainty_threshold_auto_pause: 0.85
    auto_pause_delay_minutes: 15
    snooze_minutes: 15
    cooldown_minutes: 10
  model:
    provider: onnx
    model_path: /data/models/model.onnx
    device: cpu
  camera:
    stale_after_seconds: 120
    capture_timeout_seconds: 15
    retry_count: 2
    retry_backoff_seconds: 3
  retention:
    keep_clear_captures_hours: 24
    keep_event_captures_days: 30
    keep_events_days: 90
    max_capture_storage_mb: 2048
  security:
    action_token_expiration_hours: 24
  advanced:
    log_level: info
    json_logs: false
schema:
  printers:
    - printer_id: str
      name: str
      camera_entity: str
      printer_state_entity: str
      printing_states:
        - str
      pause_service_domain: str
      pause_service_service: str
      pause_service_target: str
      pause_service_data_json: str
      notify_services:
        - str
  monitoring:
    enabled: bool
    frame_interval_seconds: int
    confirmation_frames: int
    certainty_threshold_notify: float
    certainty_threshold_auto_pause: float
    auto_pause_delay_minutes: int
    snooze_minutes: int
    cooldown_minutes: int
  model:
    provider: "list(onnx|baseline)"
    model_path: str
    device: "list(cpu|cuda)"
  camera:
    stale_after_seconds: int
    capture_timeout_seconds: int
    retry_count: int
    retry_backoff_seconds: int
  retention:
    keep_clear_captures_hours: int
    keep_event_captures_days: int
    keep_events_days: int
    max_capture_storage_mb: int
  security:
    action_token_expiration_hours: int
  advanced:
    log_level: "list(debug|info|warning|error|critical)"
    json_logs: bool
